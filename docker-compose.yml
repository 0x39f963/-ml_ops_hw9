services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: dz9_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: dz9_minio_init
    depends_on:
      - minio
    volumes:
      - ./data:/demo-data:ro
    entrypoint:
      - /bin/sh
      - -lc
      - |
        for i in $(seq 1 30); do
          mc alias set local http://minio:9000 minioadmin minioadmin && mc ls local >/dev/null && break
          sleep 2
        done
        mc mb --ignore-existing local/inventory-batches
        mc cp /demo-data/demo_inventory_batch.csv local/inventory-batches/incoming/2026-05-24/inventory.csv
        mc ls -r local/inventory-batches

  airflow:
    image: apache/airflow:2.10.5-python3.12
    container_name: dz9_airflow
    user: "${AIRFLOW_UID:-1000}:0"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW_CONN_FS_DEFAULT: '{"conn_type":"fs","extra":{"path":"/opt/airflow"}}'
      AIRFLOW_CONN_AWS_DEFAULT: "aws://minioadmin:minioadmin@/?endpoint_url=http%3A%2F%2Fminio%3A9000&region_name=us-east-1"
      DZ9_USE_S3_SENSOR: "${DZ9_USE_S3_SENSOR:-0}"
      PYTHONPATH: /opt/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas scikit-learn scipy matplotlib joblib apache-airflow-providers-amazon"
    depends_on:
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./reports:/opt/airflow/reports
      - ./models:/opt/airflow/models
    ports:
      - "${AIRFLOW_PORT:-18080}:8080"
    command:
      - bash
      - -lc
      - |
        set -e
        airflow db migrate
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
        airflow webserver --port 8080 --hostname 0.0.0.0 &
        exec airflow scheduler

volumes:
  minio_data:
